# Dependency updates (requires Dependabot + security updates enabled on GitHub).
# Dependabot: grouped dependency update PRs (pip, npm, GitHub Actions).
# Local supply-chain checks: docs/CI_LOCAL.md (npm audit, OSV lockfile scan).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "supply-chain"
    commit-message:
      prefix: "deps(backend)"
    groups:
      backend-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "supply-chain"
    commit-message:
      prefix: "deps(frontend)"
    # Tailwind v4 needs @tailwindcss/postcss + config migration — ignore major until tracked separately.
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
      styling:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "supply-chain"
    commit-message:
      prefix: "deps(actions)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "supply-chain"
    commit-message:
      prefix: "deps(docker)"
