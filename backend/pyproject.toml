[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "auto-defense-backend"
version = "0.1.0"
description = "Autonomous AI Defense System backend (FastAPI + agents + Redis event bus)"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.7.0",
  "pydantic-settings>=2.3.0",
  "redis>=5.0.0",
  "python-dotenv>=1.0.1",
  "cryptography>=42.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "httpx>=0.27.0",
  "fakeredis>=2.23.0",
  "ruff>=0.5.0",
]

[tool.ruff]
line-length = 100
