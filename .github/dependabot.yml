# Dependency updates (requires Dependabot enabled for the repo on GitHub).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Tailwind v4 needs @tailwindcss/postcss + config migration — ignore major until tracked separately.
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
      styling:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
