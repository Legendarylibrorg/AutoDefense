# Dependency vulnerability gates and PR dependency review (complements Dependabot bumps).
name: Supply chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly audit even when no dependency PRs land.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install from lockfile
        run: npm ci

      - name: Audit (moderate+)
        run: npm audit --audit-level=moderate

  osv-lockfiles:
    name: OSV lockfile scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan uv.lock and package-lock.json
        uses: google/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=backend/uv.lock
            --lockfile=frontend/package-lock.json
